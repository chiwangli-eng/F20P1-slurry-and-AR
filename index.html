<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wastewater Mixing & Treatment Dashboard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-50 via-blue-50/40 to-indigo-50 min-h-screen text-gray-800 font-sans">
    
    <!-- This is where the React app will be injected -->
    <div id="root"></div>

    <!-- React Application Logic -->
    <script type="text/babel">
        const { useState, useMemo } = React;

        const SliderInput = ({ label, value, setter, min, max, step, iconClass, unit, colorClass = "text-blue-500", bgHoverClass = "group-hover:bg-blue-100" }) => (
          <div className="mb-3 bg-white p-3 rounded-xl border border-gray-100 shadow-sm hover:shadow-md hover:border-blue-100 transition-all duration-300 group">
            <div className="flex justify-between items-center mb-2">
              <label className="text-xs font-bold text-gray-700 flex items-center gap-2">
                <span className={`bg-gray-50 ${bgHoverClass} p-1.5 rounded-lg transition-colors duration-300`}>
                  <i className={`${iconClass} ${colorClass} text-sm w-4 text-center`}></i>
                </span>
                {label}
              </label>
              <div className="flex items-center gap-1 bg-gray-50 rounded-md p-1 border border-gray-100 group-hover:border-blue-200 transition-colors">
                <input
                  type="number"
                  value={value}
                  onChange={(e) => setter(Number(e.target.value))}
                  className="w-16 px-1 py-0.5 text-right text-xs font-bold text-gray-800 bg-transparent focus:outline-none focus:ring-0"
                  min={min}
                  max={max}
                  step={step}
                />
                <span className="text-[10px] text-gray-400 font-bold w-6">{unit}</span>
              </div>
            </div>
            <input
              type="range"
              min={min}
              max={max}
              step={step}
              value={value}
              onChange={(e) => setter(Number(e.target.value))}
              className={`w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-${colorClass.split('-')[1]}-600 hover:h-2 transition-all`}
            />
            <div className="flex justify-between mt-1 px-1">
              <span className="text-[9px] font-medium text-gray-400">{min}</span>
              <span className="text-[9px] font-medium text-gray-400">{max}</span>
            </div>
          </div>
        );

        function App() {
          const [mixStreams, setMixStreams] = useState(true);

          // F20P1 Wastewater State
          const [f20p1FMgL, setF20p1FMgL] = useState(1200);
          const [f20p1Ph, setF20p1Ph] = useState(3.52);
          const [f20p1Flow, setF20p1Flow] = useState(2000);
          const [rawSulfateMgL, setRawSulfateMgL] = useState(300);

          // HFC Stream State
          const [hfcFWtPct, setHfcFWtPct] = useState(10);
          const [hfcFlow, setHfcFlow] = useState(10);

          // Reagent A State (Fixed Target pH)
          const targetPh = 8.5; 

          // Adsorption Sludge State
          const [fAfterCryst, setFAfterCryst] = useState(100);
          const [fAfterAdsorption, setFAfterAdsorption] = useState(10);
          const [alFRatioAdsorption, setAlFRatioAdsorption] = useState(2);
          const [waterContent, setWaterContent] = useState(80);
          const [adsorptionReagent, setAdsorptionReagent] = useState('C'); // Toggle: 'C' or 'C+A'

          // Constants
          const Ka = Math.pow(10, -3.19);
          const MOLAR_MASS_F_MG = 19000;
          const MOLAR_MASS_SO4_MG = 96000; // mg/mol

          const results = useMemo(() => {
            if (!mixStreams) {
              return { isMixed: false, fMgL: f20p1FMgL, ph: f20p1Ph, flow: f20p1Flow };
            }

            const f_f20p1_mol_L = f20p1FMgL / MOLAR_MASS_F_MG;
            const f_hfc_mg_L = (hfcFWtPct / 100) * 1000 * 1000;
            const f_hfc_mol_L = f_hfc_mg_L / MOLAR_MASS_F_MG;

            const total_f_moles = (f_f20p1_mol_L * f20p1Flow) + (f_hfc_mol_L * hfcFlow);
            const total_volume = f20p1Flow + hfcFlow;

            const mixed_F_mol_L = total_f_moles / total_volume;
            const mixed_F_mg_L = mixed_F_mol_L * MOLAR_MASS_F_MG;

            const calcChargeDiff = (ph, f_mg_l) => {
              const h_plus = Math.pow(10, -ph);
              const oh_minus = Math.pow(10, -(14 - ph));
              const totf_mol_l = f_mg_l / MOLAR_MASS_F_MG;
              const f_minus = (Ka * totf_mol_l) / (h_plus + Ka);
              return oh_minus + f_minus - h_plus;
            };

            const charge_diff_F20P1 = calcChargeDiff(f20p1Ph, f20p1FMgL);
            const adjusted_charge_diff = charge_diff_F20P1 * (f20p1Flow / total_volume);

            const objective = (ph_val) => {
              const h_plus_val = Math.pow(10, -ph_val);
              const oh_minus_val = Math.pow(10, -(14 - ph_val));
              const f_minus_val = (Ka * mixed_F_mol_L) / (h_plus_val + Ka);
              return h_plus_val + adjusted_charge_diff - oh_minus_val - f_minus_val;
            };

            let low = 0;
            let high = 14;
            let mixed_pH = 7;

            for (let i = 0; i < 45; i++) {
              mixed_pH = (low + high) / 2;
              const val = objective(mixed_pH);
              if (val > 0) { low = mixed_pH; } 
              else { high = mixed_pH; }
            }

            return { isMixed: true, fMgL: mixed_F_mg_L, ph: mixed_pH, flow: total_volume };
          }, [mixStreams, f20p1FMgL, f20p1Ph, f20p1Flow, hfcFWtPct, hfcFlow]);

          const treatmentResults = useMemo(() => {
            const currentPh = results.ph;
            const currentFMgL = results.fMgL;
            const currentFlow = results.flow;

            if (currentFMgL === 0) return { aChemicalKgPerDay: 0, alFRatio: 0, alOh3EquivalentKgPerDay: 0 };

            const Al_mol_per_kg_A = 2.51;
            const TOTF_mol_L = currentFMgL / 19000;
            const F_treated_kg_per_L = currentFMgL / 1000000;
            const ten_neg_pH = Math.pow(10, -currentPh);
            const ten_neg_pHtar = Math.pow(10, -targetPh);
            const F_mol_L = (Ka / (Ka + ten_neg_pH)) * TOTF_mol_L;
            const HF_mol_L = TOTF_mol_L - F_mol_L;

            const Alkali_mol_L = (ten_neg_pH - ten_neg_pHtar) + 
                                 (Math.pow(10, targetPh - 14) - Math.pow(10, currentPh - 14)) + 
                                 HF_mol_L;

            const Al_mol_L = Alkali_mol_L / 6;
            const Al_F_for_A = (Al_mol_L / TOTF_mol_L) * 6;
            const A_chemical_kg_per_kgF = (TOTF_mol_L / 6) * Al_F_for_A / Al_mol_per_kg_A / F_treated_kg_per_L;

            const F_kg_per_day = (currentFMgL * currentFlow) / 1000;
            const A_chemical_kg_per_day = A_chemical_kg_per_kgF * F_kg_per_day;

            const total_Al_moles_per_day = A_chemical_kg_per_day * Al_mol_per_kg_A;
            const MOLAR_MASS_AL_OH_3_KG = 0.07801;
            const alOh3EquivalentKgPerDay = total_Al_moles_per_day * MOLAR_MASS_AL_OH_3_KG;

            return {
              aChemicalKgPerDay: Math.max(0, A_chemical_kg_per_day),
              alFRatio: Math.max(0, Al_F_for_A),
              alOh3EquivalentKgPerDay: Math.max(0, alOh3EquivalentKgPerDay)
            };
          }, [results, targetPh, Ka]);

          const sulfateResults = useMemo(() => {
            const currentFlow = results.flow;
            if (currentFlow === 0) return { finalSulfateMgL: 0 };

            // 1. Base sulfate from Raw stream (assuming HFC introduces 0 sulfate)
            const mixedRawSulfateMgL = (rawSulfateMgL * f20p1Flow) / currentFlow;

            // 2. Sulfate introduced during Crystallization
            const x = treatmentResults.alFRatio;
            const alFForC = Math.max(0, 1 - x); 
            
            const currentFMgL = results.fMgL;
            const TOTF_mol_L_cryst = currentFMgL / 19000;
            
            // Reagent C has a Sulfate/Al molar ratio of 1.8
            const sulfateCrystMolL = (alFForC / 6) * TOTF_mol_L_cryst * 1.8;

            // 3. Sulfate introduced during Adsorption
            const fMolLAfterCryst = fAfterCryst / 19000;
            const alAdsorptionMolL = fMolLAfterCryst * alFRatioAdsorption;
            
            let sulfateAdsorptionMolL = 0;
            if (adsorptionReagent === 'C') {
              sulfateAdsorptionMolL = alAdsorptionMolL * 1.8;
            } else if (adsorptionReagent === 'C+A') {
              sulfateAdsorptionMolL = alAdsorptionMolL * 0.566 * 1.8;
            }

            // Sum up added moles and convert to mg/L
            const addedSulfateMgL = (sulfateCrystMolL + sulfateAdsorptionMolL) * MOLAR_MASS_SO4_MG;
            const finalSulfateMgL = mixedRawSulfateMgL + addedSulfateMgL;

            return { finalSulfateMgL };
          }, [results.flow, results.fMgL, f20p1Flow, rawSulfateMgL, treatmentResults.alFRatio, fAfterCryst, alFRatioAdsorption, adsorptionReagent]);

          const sludgeResults = useMemo(() => {
            const currentFlow = results.flow;
            
            const fMolesPerDay = (fAfterCryst / 19000) * currentFlow * 1000;
            const fAdsorbedKgPerDay = Math.max(0, (fAfterCryst - fAfterAdsorption) * currentFlow / 1000);
            
            const alMolesPerDay = fMolesPerDay * alFRatioAdsorption;
            const alOh3GeneratedKgPerDay = alMolesPerDay * 0.07801;
            
            const totalDrySludge = alOh3GeneratedKgPerDay + fAdsorbedKgPerDay;
            const alOh3Needed = treatmentResults.alOh3EquivalentKgPerDay;
            
            let canTotallyReuse = true;
            let excessDry = 0;
            let wetExcess = 0;
            let shortfallAlOh3 = 0;

            if (alOh3GeneratedKgPerDay > alOh3Needed) {
              canTotallyReuse = false;
              const excessAlOh3 = alOh3GeneratedKgPerDay - alOh3Needed;
              const excessRatio = excessAlOh3 / alOh3GeneratedKgPerDay;
              
              excessDry = excessAlOh3 + (fAdsorbedKgPerDay * excessRatio);
              wetExcess = excessDry / (1 - (waterContent / 100));
            } else {
              canTotallyReuse = true;
              shortfallAlOh3 = alOh3Needed - alOh3GeneratedKgPerDay;
            }

            return { 
              generatedDry: totalDrySludge, 
              excessDry, 
              wetExcess, 
              shortfallAlOh3, 
              canTotallyReuse 
            };
          }, [results.flow, fAfterCryst, fAfterAdsorption, alFRatioAdsorption, treatmentResults.alOh3EquivalentKgPerDay, waterContent]);

          return (
            <div className="p-4 md:p-8 min-h-screen flex justify-center">
              <div className="w-full max-w-6xl space-y-6">
                
                {/* Header Compact with Vivid Gradient */}
                <div className="bg-white/80 backdrop-blur-md rounded-2xl p-5 shadow-sm border border-white flex flex-col sm:flex-row justify-between items-center gap-4 hover:shadow-md transition-shadow">
                  <div className="flex items-center gap-4">
                    <div className="bg-gradient-to-br from-blue-500 to-indigo-600 p-3 rounded-xl shadow-inner text-white flex items-center justify-center">
                      <i className="fa-solid fa-water fa-lg"></i>
                    </div>
                    <div>
                      <h1 className="text-2xl font-black bg-gradient-to-r from-blue-700 to-indigo-700 bg-clip-text text-transparent leading-tight">Wastewater Dashboard</h1>
                      <p className="text-gray-500 font-medium text-xs mt-0.5">Stream Mixing, Adsorption Modeling & Sludge disposal after AR</p>
                    </div>
                  </div>
                </div>

                {/* Main Content Dashboard Grid */}
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
                  
                  {/* LEFT & MIDDLE: Inputs Panel (Spans 2 columns) */}
                  <div className="lg:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-6 items-start">
                    
                    {/* LEFT Column: Raw Streams */}
                    <div className="space-y-6">
                      {/* F20P1 Settings */}
                      <div className="bg-white rounded-2xl p-5 shadow-sm hover:shadow-xl transition-shadow duration-300 border-t-4 border-t-teal-400 border-x border-b border-gray-100 relative overflow-hidden">
                        <div className="absolute top-0 right-0 p-4 opacity-5 pointer-events-none text-teal-500"><i className="fa-solid fa-flask text-6xl"></i></div>
                        <h2 className="text-sm font-black text-gray-800 flex items-center gap-2 mb-4 uppercase tracking-wider">
                          <span className="bg-teal-100 text-teal-600 p-1.5 rounded-md"><i className="fa-solid fa-flask"></i></span> HFD Wastewater
                        </h2>
                        <SliderInput label="F Concentration" value={f20p1FMgL} setter={setF20p1FMgL} min={100} max={3000} step={10} iconClass="fa-solid fa-vial" unit="mg/L" colorClass="text-teal-500" bgHoverClass="group-hover:bg-teal-50" />
                        <SliderInput label="pH Level" value={f20p1Ph} setter={setF20p1Ph} min={0} max={14} step={0.01} iconClass="fa-solid fa-flask-vial" unit="pH" colorClass="text-teal-500" bgHoverClass="group-hover:bg-teal-50" />
                        <SliderInput label="Flow Rate" value={f20p1Flow} setter={setF20p1Flow} min={100} max={3000} step={10} iconClass="fa-solid fa-droplet" unit="m³/d" colorClass="text-teal-500" bgHoverClass="group-hover:bg-teal-50" />
                        <SliderInput label="Raw Sulfate (SO₄²⁻)" value={rawSulfateMgL} setter={setRawSulfateMgL} min={10} max={3000} step={10} iconClass="fa-solid fa-vial-circle-check" unit="mg/L" colorClass="text-teal-500" bgHoverClass="group-hover:bg-teal-50" />
                      </div>

                      {/* HFC Stream Settings */}
                      <div className="bg-white rounded-2xl p-5 shadow-sm hover:shadow-xl transition-shadow duration-300 border-t-4 border-t-purple-400 border-x border-b border-gray-100 relative overflow-hidden">
                        <div className="absolute top-0 right-0 p-4 opacity-5 pointer-events-none text-purple-500"><i className="fa-solid fa-flask-vial text-6xl"></i></div>
                        <h2 className="text-sm font-black text-gray-800 flex items-center gap-2 mb-4 uppercase tracking-wider">
                          <span className="bg-purple-100 text-purple-600 p-1.5 rounded-md"><i className="fa-solid fa-flask text-purple-600"></i></span> HFC Stream
                        </h2>
                        
                        {/* Moved Toggle Switch */}
                        <div className="mb-5 flex items-center justify-between bg-gray-50 p-2 rounded-xl border border-gray-100 group hover:border-purple-200 transition-colors">
                          <span className="text-xs font-bold text-gray-600 ml-2">Mix with HFD?</span>
                          <div className="flex items-center gap-1.5 bg-gray-200/50 p-1 rounded-lg">
                            <span className={`text-[10px] font-bold px-2 py-1 rounded-md transition-colors ${!mixStreams ? 'bg-white text-gray-800 shadow-sm' : 'text-gray-400'}`}>No (Raw)</span>
                            <button 
                              onClick={() => setMixStreams(!mixStreams)}
                              className={`relative inline-flex h-5 w-9 items-center rounded-full transition-colors focus:outline-none shadow-inner ${mixStreams ? 'bg-purple-500' : 'bg-gray-300'}`}
                            >
                              <span className={`inline-block h-3.5 w-3.5 transform rounded-full bg-white transition-transform shadow-md ${mixStreams ? 'translate-x-5' : 'translate-x-1'}`}></span>
                            </button>
                            <span className={`text-[10px] font-bold px-2 py-1 rounded-md transition-colors ${mixStreams ? 'bg-white text-purple-700 shadow-sm' : 'text-gray-400'}`}>Yes (Mixed)</span>
                          </div>
                        </div>

                        <SliderInput label="F Concentration" value={hfcFWtPct} setter={setHfcFWtPct} min={0} max={30} step={0.1} iconClass="fa-solid fa-vial" unit="wt %" colorClass="text-purple-500" bgHoverClass="group-hover:bg-purple-50" />
                        <SliderInput label="Flow Rate" value={hfcFlow} setter={setHfcFlow} min={0} max={30} step={0.1} iconClass="fa-solid fa-droplet" unit="m³/d" colorClass="text-purple-500" bgHoverClass="group-hover:bg-purple-50" />
                        
                        {!mixStreams && (
                          <div className="mt-4 p-3 bg-gradient-to-r from-orange-50 to-amber-50 text-orange-800 rounded-lg border border-orange-200 text-xs font-semibold shadow-inner">
                            <i className="fa-solid fa-circle-info mr-1 text-orange-500"></i> Streams unmixed. Displaying raw HFD properties.
                          </div>
                        )}
                      </div>
                    </div>

                    {/* MIDDLE Column: Treatment & Adsorption */}
                    <div className="space-y-6">
                      {/* Adsorption Settings */}
                      <div className="bg-white rounded-2xl p-5 shadow-sm hover:shadow-xl transition-shadow duration-300 border-t-4 border-t-emerald-400 border-x border-b border-gray-100 relative overflow-hidden">
                        <div className="absolute top-0 right-0 p-4 opacity-5 pointer-events-none text-emerald-500"><i className="fa-solid fa-filter text-6xl"></i></div>
                        <h2 className="text-sm font-black text-gray-800 flex items-center gap-2 mb-4 uppercase tracking-wider">
                          <span className="bg-emerald-100 text-emerald-600 p-1.5 rounded-md"><i className="fa-solid fa-filter"></i></span> Adsorption Downstream
                        </h2>
                        
                        {/* New Reagent Toggle */}
                        <div className="mb-4 bg-gray-50 p-3 rounded-xl border border-gray-100 hover:border-emerald-200 transition-colors group">
                          <label className="text-xs font-bold text-gray-700 flex items-center gap-2 mb-2">
                            <span className="bg-white group-hover:bg-emerald-50 p-1.5 rounded-lg transition-colors">
                              <i className="fa-solid fa-flask text-emerald-500 w-4 text-center"></i>
                            </span>
                            Adsorption Reagent
                          </label>
                          <div className="flex bg-gray-200/80 rounded-lg p-1 shadow-inner">
                            <button
                              onClick={() => setAdsorptionReagent('C')}
                              className={`flex-1 text-xs py-1.5 rounded-md shadow-sm font-bold transition-all ${adsorptionReagent === 'C' ? 'bg-white text-emerald-600 scale-[1.02]' : 'text-gray-500 shadow-none hover:text-gray-700'}`}
                            >
                              Reagent C
                            </button>
                            <button
                              onClick={() => setAdsorptionReagent('C+A')}
                              className={`flex-1 text-xs py-1.5 rounded-md shadow-sm font-bold transition-all ${adsorptionReagent === 'C+A' ? 'bg-white text-emerald-600 scale-[1.02]' : 'text-gray-500 shadow-none hover:text-gray-700'}`}
                            >
                              Reagent C + A
                            </button>
                          </div>
                          <p className="text-[10px] font-semibold text-gray-500 mt-2 text-center bg-white py-1 rounded-md border border-gray-100">
                            {adsorptionReagent === 'C' ? '100% Al from Reagent C' : '56.6% Al from C, 43.4% from A'}
                          </p>
                        </div>

                        <SliderInput label="F after Crystallization" value={fAfterCryst} setter={setFAfterCryst} min={40} max={200} step={1} iconClass="fa-solid fa-cubes" unit="mg/L" colorClass="text-emerald-500" bgHoverClass="group-hover:bg-emerald-50" />
                        <SliderInput label="F after Adsorption" value={fAfterAdsorption} setter={setFAfterAdsorption} min={0} max={20} step={1} iconClass="fa-solid fa-check-double" unit="mg/L" colorClass="text-emerald-500" bgHoverClass="group-hover:bg-emerald-50" />
                        <SliderInput label="Al/F Dosing Ratio" value={alFRatioAdsorption} setter={setAlFRatioAdsorption} min={1} max={4} step={0.1} iconClass="fa-solid fa-scale-balanced" unit="mol" colorClass="text-emerald-500" bgHoverClass="group-hover:bg-emerald-50" />
                        <SliderInput label="Sludge Water Content" value={waterContent} setter={setWaterContent} min={10} max={90} step={1} iconClass="fa-solid fa-droplet" unit="%" colorClass="text-emerald-500" bgHoverClass="group-hover:bg-emerald-50" />
                      </div>
                    </div>

                  </div>

                  {/* RIGHT: Results Panel (Spans 1 column) */}
                  <div className="lg:col-span-1 space-y-6">
                    
                    {/* Final Mix Results Widget */}
                    <div className="bg-gradient-to-br from-gray-900 via-slate-800 to-indigo-950 rounded-2xl p-5 shadow-xl text-white border border-slate-700 relative overflow-hidden">
                      <div className="absolute top-0 right-0 p-4 opacity-10 pointer-events-none"><i className="fa-solid fa-sliders text-6xl text-blue-300"></i></div>
                      <h2 className="text-sm font-black text-blue-300 flex items-center gap-2 mb-4 pb-3 border-b border-slate-700 uppercase tracking-wider">
                        <i className="fa-solid fa-sliders"></i> Output Stream
                      </h2>
                      <div className="space-y-3 relative z-10">
                        <div className="flex justify-between items-end bg-white/5 hover:bg-white/10 transition-colors p-3 rounded-xl border border-white/10 backdrop-blur-sm">
                          <span className="text-xs text-blue-200 font-bold tracking-wide"><i className="fa-solid fa-flask-vial w-4 opacity-70"></i> Final pH</span>
                          <span className="text-2xl font-black tabular-nums">{results.ph.toFixed(2)}</span>
                        </div>
                        <div className="flex justify-between items-end bg-white/5 hover:bg-white/10 transition-colors p-3 rounded-xl border border-white/10 backdrop-blur-sm">
                          <span className="text-xs text-teal-200 font-bold tracking-wide"><i className="fa-solid fa-vial w-4 opacity-70"></i> F Conc.</span>
                          <div>
                            <span className="text-2xl font-black tabular-nums text-teal-400">{results.fMgL.toLocaleString('en-US', { maximumFractionDigits: 0 })}</span>
                            <span className="text-[10px] font-bold text-teal-200/50 ml-1">mg/L</span>
                          </div>
                        </div>
                        <div className="flex justify-between items-end bg-white/5 hover:bg-white/10 transition-colors p-3 rounded-xl border border-white/10 backdrop-blur-sm">
                          <span className="text-xs text-purple-200 font-bold tracking-wide"><i className="fa-solid fa-droplet w-4 opacity-70"></i> Flow Rate</span>
                          <div>
                            <span className="text-2xl font-black tabular-nums text-purple-400">{results.flow.toLocaleString('en-US', { maximumFractionDigits: 0 })}</span>
                            <span className="text-[10px] font-bold text-purple-200/50 ml-1">m³/d</span>
                          </div>
                        </div>
                        {/* Sulfate Output with extra pop */}
                        <div className="flex justify-between items-end bg-gradient-to-r from-yellow-500/10 to-amber-500/20 hover:from-yellow-500/20 hover:to-amber-500/30 transition-colors p-3.5 rounded-xl border border-yellow-500/30 shadow-[inset_0_1px_15px_rgba(234,179,8,0.1)]">
                          <span className="text-xs text-yellow-300 font-black tracking-wide"><i className="fa-solid fa-vial-circle-check w-4 opacity-80"></i> Final Sulfate</span>
                          <div>
                            <span className="text-3xl font-black tabular-nums text-yellow-400 drop-shadow-md">{sulfateResults.finalSulfateMgL.toLocaleString('en-US', { maximumFractionDigits: 0 })}</span>
                            <span className="text-[10px] font-bold text-yellow-200/50 ml-1">mg/L</span>
                          </div>
                        </div>
                      </div>
                    </div>

                    {/* Reagent A Results */}
                    <div className="bg-gradient-to-br from-indigo-50 to-blue-50 rounded-2xl p-5 shadow-md border border-indigo-100 hover:shadow-lg transition-shadow">
                      <h2 className="text-sm font-black text-indigo-900 flex items-center gap-2 mb-4 pb-3 border-b border-indigo-200/60 uppercase tracking-wider">
                        <span className="bg-indigo-200/50 text-indigo-700 p-1 rounded"><i className="fa-solid fa-flask"></i></span> Reagent A needs in R1 & R2
                      </h2>
                      <div className="space-y-3">
                        <div className="flex justify-between items-end bg-white/80 p-3 rounded-xl border border-indigo-100 shadow-sm">
                          <span className="text-xs text-indigo-800 font-bold">Reagent Req.</span>
                          <div>
                            <span className="text-xl font-black tabular-nums text-indigo-900">{treatmentResults.aChemicalKgPerDay.toLocaleString('en-US', { maximumFractionDigits: 1 })}</span>
                            <span className="text-[10px] font-bold text-indigo-500 ml-1">kg/d</span>
                          </div>
                        </div>
                        <div className="flex justify-between items-end bg-white/80 p-3 rounded-xl border border-indigo-100 shadow-sm">
                          <span className="text-xs text-indigo-800 font-bold">Equiv. Al(OH)₃</span>
                          <div>
                            <span className="text-xl font-black tabular-nums text-indigo-900">{treatmentResults.alOh3EquivalentKgPerDay.toLocaleString('en-US', { maximumFractionDigits: 1 })}</span>
                            <span className="text-[10px] font-bold text-indigo-500 ml-1">kg/d</span>
                          </div>
                        </div>
                        <div className="flex justify-between items-end bg-indigo-100/50 p-3 rounded-xl border border-indigo-200 shadow-sm">
                          <span className="text-xs text-indigo-900 font-bold">Al/F Molar Ratio</span>
                          <div>
                            <span className="text-xl font-black tabular-nums text-indigo-900">{treatmentResults.alFRatio.toFixed(2)}</span>
                            <span className="text-[10px] font-bold text-indigo-600 ml-1">x/6</span>
                          </div>
                        </div>
                      </div>
                    </div>

                    {/* Sludge Balance Results */}
                    <div className="bg-gradient-to-br from-emerald-50 to-teal-50 rounded-2xl p-5 shadow-md border border-emerald-100 hover:shadow-lg transition-shadow">
                      <div className="flex justify-between items-center mb-4 pb-3 border-b border-emerald-200/60">
                        <h2 className="text-sm font-black text-emerald-900 flex items-center gap-2 uppercase tracking-wider">
                          <span className="bg-emerald-200/50 text-emerald-700 p-1 rounded"><i className="fa-solid fa-recycle"></i></span> Sludge Balance
                        </h2>
                        {sludgeResults.canTotallyReuse ? (
                          <span className="bg-emerald-500 text-white text-[10px] px-2.5 py-1 rounded-full font-bold shadow-sm"><i className="fa-solid fa-check mr-1"></i> 100% Reuse</span>
                        ) : (
                          <span className="bg-orange-500 text-white text-[10px] px-2.5 py-1 rounded-full font-bold shadow-sm"><i className="fa-solid fa-triangle-exclamation mr-1"></i> Discharge Req.</span>
                        )}
                      </div>
                      
                      <div className="space-y-3">
                        <div className="flex justify-between items-end bg-white/80 p-3 rounded-xl border border-emerald-100 shadow-sm">
                          <div className="flex flex-col">
                            <span className="text-xs text-emerald-900 font-bold">Generated (Dry)</span>
                            <span className="text-[9px] font-semibold text-emerald-600">Al(OH)₃ + Adsorbed F</span>
                          </div>
                          <div>
                            <span className="text-xl font-black tabular-nums text-emerald-900">{sludgeResults.generatedDry.toLocaleString('en-US', { maximumFractionDigits: 1 })}</span>
                            <span className="text-[10px] font-bold text-emerald-500 ml-1">kg/d</span>
                          </div>
                        </div>

                        {!sludgeResults.canTotallyReuse ? (
                          <>
                            <div className="flex justify-between items-end bg-orange-50/80 p-3 rounded-xl border border-orange-200 shadow-sm">
                              <span className="text-xs text-orange-900 font-bold">Excess (Dry) after AR prepared</span>
                              <div>
                                <span className="text-xl font-black tabular-nums text-orange-900">{sludgeResults.excessDry.toLocaleString('en-US', { maximumFractionDigits: 1 })}</span>
                                <span className="text-[10px] font-bold text-orange-600 ml-1">kg/d</span>
                              </div>
                            </div>
                            <div className="flex justify-between items-end bg-gradient-to-r from-red-50 to-rose-50 p-3.5 rounded-xl border border-red-200 shadow-md">
                              <div className="flex flex-col">
                                <span className="text-xs text-red-900 font-black">Wet Discharge</span>
                                <span className="text-[9px] font-bold text-red-500">Includes {waterContent}% water</span>
                              </div>
                              <div>
                                <span className="text-2xl font-black tabular-nums text-red-700 drop-shadow-sm">{sludgeResults.wetExcess.toLocaleString('en-US', { maximumFractionDigits: 1 })}</span>
                                <span className="text-[10px] font-bold text-red-600 ml-1">kg/d</span>
                              </div>
                            </div>
                          </>
                        ) : (
                          <div className="flex justify-between items-end bg-blue-50/80 p-3.5 rounded-xl border border-blue-200 shadow-md">
                            <div className="flex flex-col">
                              <span className="text-xs text-blue-900 font-black">Shortfall (Dry)</span>
                              <span className="text-[9px] font-bold text-blue-500">Needed for Reagent A</span>
                            </div>
                            <div>
                              <span className="text-2xl font-black tabular-nums text-blue-800 drop-shadow-sm">{sludgeResults.shortfallAlOh3.toLocaleString('en-US', { maximumFractionDigits: 1 })}</span>
                              <span className="text-[10px] font-bold text-blue-600 ml-1">kg/d</span>
                            </div>
                          </div>
                        )}
                      </div>
                    </div>

                  </div>
                </div>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
